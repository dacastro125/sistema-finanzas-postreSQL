<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuentas - FinanzasOS</title>
    <!-- Premium Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .table-container {
            background: var(--surface);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--surface-border);
            margin-top: 1.5rem;
            overflow-x: auto;
        }
    </style>
</head>

<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-wallet" style="color: var(--primary)"></i> FinanzasOS
            </div>
            <nav>
                <a href="dashboard.html" class="nav-link" id="nav-dashboard">
                    <i class="fas fa-th-large"></i> Dashboard
                </a>
                <a href="budgets.html" class="nav-link" id="nav-budgets">
                    <i class="fas fa-bullseye"></i> Presupuestos
                </a>
                <a href="accounts.html" class="nav-link active" id="nav-accounts">
                    <i class="fas fa-credit-card"></i> Cuentas
                </a>
                <a href="transactions.html" class="nav-link" id="nav-transactions">
                    <i class="fas fa-exchange-alt"></i> Transacciones
                </a>
                <a href="loans.html" class="nav-link" id="nav-loans">
                    <i class="fas fa-calculator"></i> Calculadora Amort.
                </a>
                <a href="credits.html" class="nav-link" id="nav-credits">
                    <i class="fas fa-list"></i> Lista de Préstamos
                </a>
            </nav>
            <div class="sidebar-footer">
                <div id="userProfileName" style="color: white; margin-bottom: 1rem; font-weight:500;"></div>
                <a href="#" class="nav-link" id="logoutBtn" style="color: var(--danger)">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header-top">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <h2>Gestión de Cuentas</h2>
                </div>
                <div style="display:flex; gap: 1rem;">
                    <button class="btn" id="newAccountBtn" style="width: auto;">
                        <i class="fas fa-plus"></i> Nueva Cuenta
                    </button>
                </div>
            </header>

            <div class="table-container animate-fade-in" style="animation-delay: 0.1s;">
                <h3 class="card-title" style="margin-bottom: 1rem;">Cuentas Activas</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Nombre de Cuenta</th>
                            <th>Tipo</th>
                            <th>Saldo Actual</th>
                            <th style="text-align: right;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="accountsTableBody">
                        <tr>
                            <td colspan="4" style="text-align: center; color: var(--text-muted);">Cargando cuentas...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal para Añadir/Editar Cuenta -->
    <div class="modal-overlay" id="accountManageModal">
        <div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
            <div class="modal-header">
                <h3 class="modal-title" id="accountModalTitle">Registrar Cuenta</h3>
                <button class="modal-close" id="closeAccountManageModal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="accountManageForm" style="display: flex; flex-direction: column; gap: 1rem;">
                    <div class="form-group">
                        <label>Nombre de la Cuenta</label>
                        <input type="text" id="accManageName" class="form-control" required
                            placeholder="Ej. BCP, Efectivo">
                    </div>
                    <div class="form-group">
                        <label>Tipo de Cuenta</label>
                        <select id="accManageType" class="form-control" required>
                            <option style="color:black" value="cash">Efectivo</option>
                            <option style="color:black" value="bank">Ahorros</option>
                            <option style="color:black" value="credit">Tarjeta de Crédito</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Saldo</label>
                        <input type="number" step="0.01" id="accManageBalance" class="form-control" required
                            placeholder="0.00">
                    </div>
                    <button type="submit" class="btn btn-primary"
                        style="width: 100%; margin-top: 0.5rem;">Guardar</button>
                </form>
            </div>
        </div>
    </div>

    <script src="./js/accounts.js"></script>
</body>

</html>
