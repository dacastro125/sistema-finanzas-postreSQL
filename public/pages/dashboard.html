<style>
/* dashboard page-specific styles already in style.css */
</style>

<main class="main-content">
    <header class="header-top">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <h2>Resumen Financiero</h2>
            <div class="period-filters" style="display: flex; gap: 0.5rem;">
                <select id="filterMonth" class="form-control"
                    style="width: auto; padding: 0.5rem; background: var(--surface);">
                    <option style="color:black" value="0">Enero</option>
                    <option style="color:black" value="1">Febrero</option>
                    <option style="color:black" value="2">Marzo</option>
                    <option style="color:black" value="3">Abril</option>
                    <option style="color:black" value="4">Mayo</option>
                    <option style="color:black" value="5">Junio</option>
                    <option style="color:black" value="6">Julio</option>
                    <option style="color:black" value="7">Agosto</option>
                    <option style="color:black" value="8">Septiembre</option>
                    <option style="color:black" value="9">Octubre</option>
                    <option style="color:black" value="10">Noviembre</option>
                    <option style="color:black" value="11">Diciembre</option>
                </select>
                <select id="filterYear" class="form-control"
                    style="width: auto; padding: 0.5rem; background: var(--surface);">
                    <!-- Llenado dinámicamente con JS -->
                </select>
            </div>
        </div>
        <div style="display:flex; gap: 1rem;">
            <button class="btn" id="editTransactionsBtn"
                style="background: var(--surface); border: 1px solid var(--surface-border); width: auto;">
                <i class="fas fa-edit"></i> Editar Entradas
            </button>
            <button class="btn" id="newAccountBtn"
                style="background: var(--surface); border: 1px solid var(--surface-border); width: auto;">
                <i class="fas fa-wallet"></i> Nueva Cuenta
            </button>
            <button class="btn" id="newTransactionBtn" style="width: auto;">
                <i class="fas fa-plus"></i> Nueva Transacción
            </button>
        </div>
    </header>

    <!-- Metrics -->
    <div class="summary-cards">
        <div class="card animate-fade-in" style="animation-delay: 0.1s;">
            <h3 class="card-title">Saldo Total</h3>
            <div class="card-value" id="totalBalance">$0.00</div>
        </div>
        <div class="card animate-fade-in" style="animation-delay: 0.2s;">
            <h3 class="card-title">Ingresos del Mes</h3>
            <div class="card-value value-income" id="monthlyIncome">+$0.00</div>
        </div>
        <div class="card animate-fade-in" style="animation-delay: 0.3s;">
            <h3 class="card-title">Gastos del Mes</h3>
            <div class="card-value value-expense" id="monthlyExpense">-$0.00</div>
        </div>
    </div>

    <!-- Charts and Recent -->
    <div class="charts-section">
        <!-- Gráfica -->
        <div class="chart-container animate-fade-in" style="animation-delay: 0.4s;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3 class="card-title" style="margin: 0;">Flujo de Caja (Visual)</h3>
                <div class="chart-controls">
                    <button class="chart-btn active" data-view="doughnut" title="Gráfico Anillo"><i class="fas fa-chart-pie"></i></button>
                    <button class="chart-btn" data-view="bar" title="Gráfico Barras"><i class="fas fa-chart-bar"></i></button>
                    <button class="chart-btn" data-view="table" title="Tabla de Datos"><i class="fas fa-table"></i></button>
                </div>
            </div>

            <div id="chartView" style="position: relative; height: 250px; width: 100%;">
                <canvas id="cashflowChart"></canvas>
            </div>

            <div id="tableView" class="hidden" style="height: 250px; overflow-y: auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Tipo</th>
                            <th>Monto</th>
                        </tr>
                    </thead>
                    <tbody id="cashflowTableBody">
                        <!-- Filas de tabla -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Últimas Transacciones -->
        <div class="recent-transactions animate-fade-in" style="animation-delay: 0.5s;">
            <h3 class="card-title" style="margin-bottom: 1rem;">Transacciones Recientes</h3>
            <div id="recentTransactionsList">
                <p style="color: var(--text-muted); text-align: center; margin-top: 2rem;">No hay transacciones recientes.</p>
            </div>
        </div>
    </div>
</main>

<!-- Modal Cuentas -->
<div class="modal-overlay" id="accountModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title">Nueva Cuenta</h3>
            <button class="modal-close" id="closeAccountModal"><i class="fas fa-times"></i></button>
        </div>
        <form id="accountForm">
            <div class="form-group">
                <label>Nombre de Cuenta</label>
                <input type="text" id="accName" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Tipo</label>
                <select id="accType" class="form-control" required style="background: rgba(15, 23, 42, 0.5); color:white;">
                    <option style="color:black;" value="Efectivo">Efectivo</option>
                    <option style="color:black;" value="Cuenta de Ahorros">Cuenta de Ahorros</option>
                    <option style="color:black;" value="Tarjeta de Crédito">Tarjeta de Crédito</option>
                </select>
            </div>
            <div class="form-group">
                <label>Saldo Inicial ($)</label>
                <input type="number" step="0.01" id="accBalance" class="form-control" required>
            </div>
            <button type="submit" class="btn">Guardar Cuenta</button>
        </form>
    </div>
</div>

<!-- Modal Transacción -->
<div class="modal-overlay" id="txModal">
    <div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
        <div class="modal-header">
            <h3 class="modal-title">Registrar Transacción</h3>
            <button class="modal-close" id="closeTxModal"><i class="fas fa-times"></i></button>
        </div>
        <form id="txForm">
            <div class="form-group">
                <label>Tipo</label>
                <select id="txType" class="form-control" required style="background: rgba(15, 23, 42, 0.5); color:white;">
                    <option style="color:black;" value="expense">Gasto</option>
                    <option style="color:black;" value="income">Ingreso</option>
                    <option style="color:black;" value="transfer">Transferencia</option>
                </select>
            </div>
            <div class="form-group">
                <label>Monto ($)</label>
                <input type="number" step="0.01" id="txAmount" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Cuenta Origen</label>
                <select id="txAccount" class="form-control" required style="background: rgba(15, 23, 42, 0.5); color:white;"></select>
            </div>
            <div class="form-group hidden" id="targetAccountGroup">
                <label>Cuenta Destino</label>
                <select id="txTargetAccount" class="form-control" style="background: rgba(15, 23, 42, 0.5); color:white;"></select>
            </div>
            <div class="form-group">
                <label>Categoría</label>
                <select id="txCategory" class="form-control" required style="background: rgba(15, 23, 42, 0.5); color:white;"></select>
            </div>
            <div class="form-group">
                <label>Fecha</label>
                <input type="date" id="txDate" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Nota (opcional)</label>
                <input type="text" id="txNote" class="form-control">
            </div>
            <button type="submit" class="btn">Guardar Transacción</button>
        </form>
    </div>
</div>

<!-- Modal Editar Transacciones -->
<div class="modal-overlay" id="editTxModal">
    <div class="modal-content" style="max-width: 600px;">
        <div class="modal-header">
            <h3 class="modal-title">Editar Entradas</h3>
            <button class="modal-close" id="closeEditTxModal"><i class="fas fa-times"></i></button>
        </div>
        <div id="editTxList"
            style="max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem;">
            <p style="color: var(--text-muted); text-align: center;">Cargando transacciones...</p>
        </div>
    </div>
</div>
