<style>
    .table-container {
        background: var(--surface);
        border-radius: 1rem;
        padding: 1.5rem;
        border: 1px solid var(--surface-border);
        margin-top: 1.5rem;
        overflow-x: auto;
    }
</style>

<main class="main-content">
    <header class="header-top">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <h2>Gestión de Cuentas</h2>
        </div>
        <div style="display:flex; gap: 1rem;">
            <button class="btn" id="newAccountBtn" style="width: auto;">
                <i class="fas fa-plus"></i> Nueva Cuenta
            </button>
        </div>
    </header>

    <div class="table-container animate-fade-in" style="animation-delay: 0.1s;">
        <h3 class="card-title" style="margin-bottom: 1rem;">Cuentas Activas</h3>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Nombre de Cuenta</th>
                    <th>Tipo</th>
                    <th>Saldo Actual</th>
                    <th style="text-align: right;">Acciones</th>
                </tr>
            </thead>
            <tbody id="accountsTableBody">
                <tr>
                    <td colspan="4" style="text-align: center; color: var(--text-muted);">Cargando cuentas...</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<!-- Modal para Añadir/Editar Cuenta -->
<div class="modal-overlay" id="accountManageModal">
    <div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
        <div class="modal-header">
            <h3 class="modal-title" id="accountModalTitle">Registrar Cuenta</h3>
            <button class="modal-close" id="closeAccountManageModal"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <form id="accountManageForm" style="display: flex; flex-direction: column; gap: 1rem;">
                <div class="form-group">
                    <label>Nombre de la Cuenta</label>
                    <input type="text" id="accManageName" class="form-control" required placeholder="Ej. BCP, Efectivo">
                </div>
                <div class="form-group">
                    <label>Tipo de Cuenta</label>
                    <select id="accManageType" class="form-control" required>
                        <option style="color:black" value="cash">Efectivo</option>
                        <option style="color:black" value="bank">Ahorros</option>
                        <option style="color:black" value="credit">Tarjeta de Crédito</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Saldo</label>
                    <input type="number" step="0.01" id="accManageBalance" class="form-control" required placeholder="0.00">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Guardar</button>
            </form>
        </div>
    </div>
</div>
