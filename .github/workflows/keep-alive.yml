name: Keep Render Alive

on:
  schedule:
    # Cada 5 minutos — Render duerme tras 15 min sin actividad
    - cron: '*/5 * * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging Render app..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.RENDER_URL }}/api/health)
          echo "Response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: server responded with $STATUS"
          fi
